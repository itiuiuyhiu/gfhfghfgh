services:
  - type: web
    name: kick-telegram-notifier
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python kick_telegram_notifier.py
    envVars:
      - key: KICK_USERNAME
        value: jamie
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CHECK_INTERVAL
        value: 60
